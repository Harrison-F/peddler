<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Peddler</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --bg: #09090b;
      --surface: #18181b;
      --surface-hover: #1e1e22;
      --border: #27272a;
      --border-hover: #3f3f46;
      --text: #fafafa;
      --text-secondary: #a1a1aa;
      --text-dim: #71717a;
      --accent: #f7931a;
      --accent-glow: rgba(247, 147, 26, 0.12);
      --green: #22c55e;
      --green-glow: rgba(34, 197, 94, 0.12);
      --red: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 480px;
      width: 100%;
      padding: 24px 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .header a {
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header .logo-text { font-weight: 800; font-size: 1.1em; }
    .header .back { font-size: 0.85em; color: var(--text-secondary); text-decoration: none; }
    .header .back:hover { color: var(--text); }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 80px 24px;
    }

    .loading-spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-state p { color: var(--text-dim); font-size: 0.9em; }

    .error-state {
      text-align: center;
      padding: 60px 24px;
    }

    .error-state .icon { font-size: 2.5em; margin-bottom: 16px; }
    .error-state h3 { color: var(--text-secondary); margin-bottom: 8px; }
    .error-state p { color: var(--text-dim); font-size: 0.9em; margin-bottom: 20px; }
    .error-state a { color: var(--accent); text-decoration: none; }

    /* Product card */
    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .product-image {
      width: 100%;
      max-height: 280px;
      object-fit: contain;
      background: #111;
      padding: 20px;
    }

    .product-info {
      padding: 20px;
    }

    .product-merchant {
      font-size: 0.78em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .product-info h2 {
      font-size: 1.2em;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .product-info .description {
      color: var(--text-secondary);
      font-size: 0.88em;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .price-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .price-line .sats {
      font-size: 1.4em;
      font-weight: 700;
      color: var(--accent);
    }

    .price-line .currency {
      color: var(--text-dim);
      font-size: 0.85em;
    }

    /* Quantity */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }

    .qty-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .qty-row label { font-weight: 600; font-size: 0.9em; }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1.1em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qty-btn:hover { border-color: var(--accent); }

    #qty-display {
      font-size: 1.1em;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
    }

    /* Shipping form */
    .section-card h3 {
      font-size: 0.95em;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-row:last-child { margin-bottom: 0; }

    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-group label {
      font-size: 0.75em;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input, .form-group select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 0.9em;
      outline: none;
      font-family: inherit;
    }

    .form-group input:focus, .form-group select:focus {
      border-color: var(--accent);
    }

    /* Shipping zone selector */
    .shipping-zones {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .zone-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .zone-option:hover { border-color: var(--border-hover); }
    .zone-option.selected { border-color: var(--accent); background: var(--accent-glow); }

    .zone-option .zone-name { font-size: 0.88em; font-weight: 500; }
    .zone-option .zone-cost { font-size: 0.85em; color: var(--accent); font-weight: 600; }

    /* Summary */
    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 0.9em;
      color: var(--text-secondary);
    }

    .summary-row.total {
      border-top: 1px solid var(--border);
      margin-top: 8px;
      padding-top: 12px;
      font-weight: 700;
      font-size: 1em;
      color: var(--text);
    }

    .summary-row.total .value { color: var(--accent); }

    /* Order button */
    .order-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 1.05em;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
      margin-top: 8px;
    }

    .order-btn:hover { opacity: 0.9; }
    .order-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Order sent state */
    .order-sent {
      background: var(--green-glow);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 12px;
      padding: 32px 24px;
      text-align: center;
      margin-top: 20px;
    }

    .order-sent .icon { font-size: 2.5em; margin-bottom: 12px; }
    .order-sent h3 { color: var(--green); margin-bottom: 8px; }
    .order-sent p { color: var(--text-secondary); font-size: 0.9em; line-height: 1.5; }

    /* Payment overlay */
    .payment-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .payment-overlay.active { display: flex; }

    .payment-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    .payment-modal h3 { margin-bottom: 8px; }

    .payment-modal .amount {
      font-size: 1.8em;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .qr-container {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      display: inline-block;
      margin-bottom: 16px;
    }

    .qr-container canvas { display: block; }

    .invoice-text {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 0.7em;
      word-break: break-all;
      color: var(--text-dim);
      margin-bottom: 16px;
      cursor: pointer;
      max-height: 60px;
      overflow: hidden;
    }

    .invoice-text:hover { color: var(--text); }

    .copy-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 16px;
      font-size: 0.85em;
      cursor: pointer;
      margin-bottom: 16px;
      font-family: inherit;
    }

    .status-waiting {
      color: var(--accent);
      font-size: 0.85em;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Nostr badge */
    .nostr-badge {
      text-align: center;
      margin-top: 32px;
      padding: 16px;
      color: var(--text-dim);
      font-size: 0.75em;
    }

    .nostr-badge a { color: var(--accent); text-decoration: none; }

    @media (max-width: 640px) {
      .product-image { max-height: 200px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="/"><span style="font-size:1.2em">⚡</span> <span class="logo-text">Peddler</span></a>
      <a href="/" class="back">← Marketplace</a>
    </div>

    <div id="checkout-content">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading product from Nostr relays...</p>
      </div>
    </div>

    <div class="nostr-badge">
      Powered by Nostr · NIP-15 · Lightning Network<br>
      <a href="https://freedomlab.nyc">Freedom Lab NYC</a>
    </div>
  </div>

  <!-- Payment overlay -->
  <div class="payment-overlay" id="payment-overlay">
    <div class="payment-modal" id="payment-content"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

  <script>
    const RELAYS = [
      'wss://relay.damus.io',
      'wss://nos.lol',
      'wss://relay.primal.net',
      'wss://relay.nostr.band',
    ];

    // Our pubkey — for products we own, we can generate invoices directly
    const OUR_PUBKEY = '65e47b6367d94bb526163a293811ca5a83f4a50c605de64bb47127ffa10ac67c';
    const OUR_API = 'https://harrisons-macbook-air.tail323ae0.ts.net/peddler-api';

    // Parse URL params
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('product');
    const merchantPubkey = params.get('merchant');

    if (!productId || !merchantPubkey) {
      showError('Missing product info', 'This checkout page needs a product ID and merchant. Go back to the marketplace to find products.', '/');
    }

    let product = null;
    let stall = null;
    let quantity = 1;
    let selectedZone = null;

    // Fetch product and stall from relays
    function fetchProduct() {
      let foundProduct = false;
      let foundStall = false;
      let stallId = null;
      let relaysChecked = 0;

      RELAYS.forEach(url => {
        const ws = new WebSocket(url);
        const subId = 'checkout-' + Math.random().toString(36).slice(2, 8);

        ws.onopen = () => {
          // Fetch the specific product
          ws.send(JSON.stringify(['REQ', subId + '-product', {
            kinds: [30018],
            authors: [merchantPubkey],
            '#d': [productId],
            limit: 1,
          }]));

          // Also fetch all stalls from this merchant
          ws.send(JSON.stringify(['REQ', subId + '-stalls', {
            kinds: [30017],
            authors: [merchantPubkey],
            limit: 10,
          }]));
        };

        ws.onmessage = (msg) => {
          try {
            const data = JSON.parse(msg.data);
            if (data[0] === 'EVENT') {
              const event = data[2];
              if (event.kind === 30018 && !foundProduct) {
                const p = JSON.parse(event.content);
                p._pubkey = event.pubkey;
                p._kind = 30018;
                p._id = productId;
                p._tags = event.tags;
                product = p;
                stallId = p.stall_id;
                foundProduct = true;
              } else if (event.kind === 30017) {
                const s = JSON.parse(event.content);
                s._pubkey = event.pubkey;
                const sId = event.tags.find(t => t[0] === 'd');
                s._id = sId ? sId[1] : s.id;
                if (stallId && s._id === stallId) {
                  stall = s;
                  foundStall = true;
                } else if (!stallId) {
                  // Store for later matching
                  if (!stall) stall = s;
                }
              }
            } else if (data[0] === 'EOSE') {
              relaysChecked++;
              if (foundProduct) {
                // Try to match stall if not yet matched
                if (stallId && !foundStall) {
                  // May come from another relay
                }
                renderCheckout();
              }
              if (relaysChecked >= RELAYS.length && !foundProduct) {
                showError('Product not found', 'Could not find this product on Nostr relays. It may have been removed.', '/');
              }
              ws.close();
            }
          } catch (e) {}
        };

        ws.onerror = () => { relaysChecked++; };
      });

      // Timeout
      setTimeout(() => {
        if (!product) {
          showError('Timed out', 'Could not reach Nostr relays. Please try again.', '/');
        }
      }, 15000);
    }

    function showError(title, message, linkHref) {
      document.getElementById('checkout-content').innerHTML = `
        <div class="error-state">
          <div class="icon">😕</div>
          <h3>${title}</h3>
          <p>${message}</p>
          ${linkHref ? `<a href="${linkHref}">← Back to Marketplace</a>` : ''}
        </div>
      `;
    }

    function getProductImage() {
      if (product.images && product.images.length > 0) return product.images[0];
      if (product.image) return product.image;
      return null;
    }

    function formatSats(amount) {
      return Number(amount).toLocaleString() + ' sats';
    }

    function getCurrency() {
      return (product.currency || 'sat').toUpperCase();
    }

    function isSats() {
      const c = getCurrency();
      return c === 'SAT' || c === 'SATS' || c === 'MSAT';
    }

    function getShippingZones() {
      if (!stall || !stall.shipping) return [];
      return stall.shipping;
    }

    function renderCheckout() {
      if (!product) return;

      const img = getProductImage();
      const zones = getShippingZones();
      const merchantName = stall ? stall.name : merchantPubkey.slice(0, 12) + '…';
      const isOurs = merchantPubkey === OUR_PUBKEY;

      // Auto-select first zone
      if (zones.length > 0 && !selectedZone) {
        selectedZone = zones[0];
      }

      const priceDisplay = isSats()
        ? `<span class="sats">${formatSats(product.price)}</span>`
        : `<span class="sats">${product.price}</span> <span class="currency">${getCurrency()}</span>`;

      const zonesHtml = zones.length > 0 ? `
        <div class="section-card">
          <h3>🚚 Shipping Zone</h3>
          <div class="shipping-zones">
            ${zones.map((z, i) => `
              <div class="zone-option ${selectedZone && selectedZone.id === z.id ? 'selected' : ''}" onclick="selectZone(${i})">
                <span class="zone-name">${z.name || z.id || 'Zone ' + (i+1)}</span>
                <span class="zone-cost">${isSats() ? formatSats(z.cost || 0) : (z.cost || 0) + ' ' + getCurrency()}</span>
              </div>
            `).join('')}
          </div>
        </div>
      ` : '';

      const subtotal = product.price * quantity;
      const shippingCost = selectedZone ? (selectedZone.cost || 0) : 0;
      const total = subtotal + shippingCost;

      document.getElementById('checkout-content').innerHTML = `
        <div class="product-card">
          ${img ? `<img class="product-image" src="${img}" alt="${product.name || ''}" onerror="this.style.display='none'">` : ''}
          <div class="product-info">
            <div class="product-merchant">👤 ${merchantName}</div>
            <h2>${product.name || 'Untitled'}</h2>
            <p class="description">${product.description || ''}</p>
            <div class="price-line">${priceDisplay}</div>
          </div>
        </div>

        <div class="section-card">
          <div class="qty-row">
            <label>Quantity</label>
            <div class="qty-controls">
              <button class="qty-btn" onclick="changeQty(-1)">−</button>
              <span id="qty-display">${quantity}</span>
              <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
          </div>
        </div>

        ${zonesHtml}

        <div class="section-card">
          <h3>📦 Shipping Address</h3>
          <div class="form-row">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="ship-name" placeholder="Your name" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Address</label>
              <input type="text" id="ship-address" placeholder="Street address" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>City</label>
              <input type="text" id="ship-city" placeholder="City" required>
            </div>
            <div class="form-group" style="flex:0.5">
              <label>State</label>
              <input type="text" id="ship-state" placeholder="NY">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>ZIP / Postal Code</label>
              <input type="text" id="ship-zip" placeholder="10001" required>
            </div>
            <div class="form-group">
              <label>Country</label>
              <input type="text" id="ship-country" placeholder="United States" value="United States">
            </div>
          </div>
        </div>

        <div class="section-card">
          <h3>Order Summary</h3>
          <div class="summary-row">
            <span>${product.name} × ${quantity}</span>
            <span>${isSats() ? formatSats(subtotal) : subtotal + ' ' + getCurrency()}</span>
          </div>
          ${selectedZone ? `
          <div class="summary-row">
            <span>Shipping (${selectedZone.name || 'Standard'})</span>
            <span>${isSats() ? formatSats(shippingCost) : shippingCost + ' ' + getCurrency()}</span>
          </div>
          ` : ''}
          <div class="summary-row total">
            <span>Total</span>
            <span class="value">${isSats() ? formatSats(total) : total + ' ' + getCurrency()}</span>
          </div>
        </div>

        <button class="order-btn" onclick="placeOrder()" id="order-btn">
          ⚡ ${isOurs ? 'Pay with Lightning' : 'Place Order'}
        </button>

        <div id="order-status"></div>
      `;
    }

    function changeQty(delta) {
      quantity = Math.max(1, Math.min(20, quantity + delta));
      renderCheckout();
    }

    function selectZone(index) {
      const zones = getShippingZones();
      selectedZone = zones[index];
      renderCheckout();
    }

    function validateForm() {
      const fields = ['ship-name', 'ship-address', 'ship-city', 'ship-zip'];
      for (const id of fields) {
        const el = document.getElementById(id);
        if (el && !el.value.trim()) {
          el.focus();
          return false;
        }
      }
      return true;
    }

    function getShippingData() {
      return {
        name: document.getElementById('ship-name')?.value || '',
        address: document.getElementById('ship-address')?.value || '',
        city: document.getElementById('ship-city')?.value || '',
        state: document.getElementById('ship-state')?.value || '',
        zip: document.getElementById('ship-zip')?.value || '',
        country: document.getElementById('ship-country')?.value || '',
      };
    }

    async function placeOrder() {
      if (!validateForm()) return;

      const btn = document.getElementById('order-btn');
      btn.disabled = true;
      btn.textContent = '⏳ Processing...';

      const isOurs = merchantPubkey === OUR_PUBKEY;
      const shipping = getShippingData();
      const shippingCost = selectedZone ? (selectedZone.cost || 0) : 0;
      const total = product.price * quantity + shippingCost;

      if (isOurs) {
        // Direct checkout — generate invoice via our API
        try {
          const res = await fetch(OUR_API + '/api/invoice', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              product_id: productId,
              quantity,
              amount_sats: total,
              shipping,
            }),
          });

          const data = await res.json();
          if (!data.invoice) throw new Error(data.error || 'Failed to generate invoice');

          showPayment(data.invoice, data.payment_hash, total);
        } catch (e) {
          btn.disabled = false;
          btn.textContent = '⚡ Pay with Lightning';
          document.getElementById('order-status').innerHTML = `
            <p style="color:var(--red);text-align:center;margin-top:12px;font-size:0.9em;">Error: ${e.message}</p>
          `;
        }
      } else {
        // Third-party merchant — show order confirmation
        // In future: send NIP-15 order DM to merchant
        showOrderSent(shipping, total);
      }
    }

    function showPayment(invoice, paymentHash, totalSats) {
      const overlay = document.getElementById('payment-overlay');
      const content = document.getElementById('payment-content');
      overlay.classList.add('active');

      content.innerHTML = `
        <h3>Pay with Lightning</h3>
        <div class="amount">${formatSats(totalSats)}</div>
        <div class="qr-container">
          <canvas id="qr-canvas"></canvas>
        </div>
        <div class="invoice-text" onclick="copyInvoice('${invoice}')" title="Click to copy">${invoice}</div>
        <button class="copy-btn" onclick="copyInvoice('${invoice}')">📋 Copy Invoice</button>
        <p class="status-waiting">Waiting for payment...</p>
      `;

      QRCode.toCanvas(document.getElementById('qr-canvas'), invoice.toUpperCase(), {
        width: 280, margin: 0,
        color: { dark: '#000', light: '#fff' },
      });

      // Poll for payment
      const check = async () => {
        try {
          const res = await fetch(`${OUR_API}/api/invoice/${paymentHash}`);
          const data = await res.json();
          if (data.paid) {
            content.innerHTML = `
              <div style="font-size:3em;margin-bottom:12px">✅</div>
              <h3 style="color:var(--green)">Payment Received!</h3>
              <p style="color:var(--text-secondary);margin-top:8px">Your order is confirmed. Thank you for supporting freedom tech.</p>
              <button class="copy-btn" style="margin-top:20px" onclick="window.location='/'">Back to Marketplace</button>
            `;
            return;
          }
        } catch (e) {}
        setTimeout(check, 3000);
      };
      check();
    }

    function showOrderSent(shipping, total) {
      document.getElementById('order-status').innerHTML = `
        <div class="order-sent">
          <div class="icon">📩</div>
          <h3>Order Request Sent</h3>
          <p>
            Your order for <strong>${quantity}× ${product.name}</strong> has been sent to the merchant.
            They'll respond with a Lightning invoice. Check back here or look for a DM on Nostr.
          </p>
          <p style="margin-top:12px;font-size:0.8em;color:var(--text-dim)">
            Total: ${isSats() ? formatSats(total) : total + ' ' + getCurrency()} · Shipping to ${shipping.city}, ${shipping.country}
          </p>
        </div>
      `;

      document.getElementById('order-btn').style.display = 'none';
    }

    function copyInvoice(invoice) {
      navigator.clipboard.writeText(invoice).then(() => {
        document.querySelector('.copy-btn').textContent = '✅ Copied!';
        setTimeout(() => document.querySelector('.copy-btn').textContent = '📋 Copy Invoice', 2000);
      });
    }

    // Start
    if (productId && merchantPubkey) {
      fetchProduct();
    }
  </script>
</body>
</html>
